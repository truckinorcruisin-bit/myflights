function generateStars(){
  var c=document.getElementById('stars');
  var w=c.width=window.innerWidth, h=c.height=window.innerHeight;
  var ctx=c.getContext('2d');
  ctx.fillStyle='#000';ctx.fillRect(0,0,w,h);
  var count=Math.floor(w*h/600);
  for(var i=0;i<count;i++){
    var x=Math.random()*w, y=Math.random()*h;
    var br=Math.random();
    var sz=br>.97?1.8:br>.9?1.2:br>.6?0.8:0.5;
    var warm=Math.random();
    var r=200+55*warm|0, g=200+55*(1-warm*.3)|0, b=220+35*(1-warm)|0;
    var alpha=.2+br*.6;
    ctx.beginPath();ctx.arc(x,y,sz,0,Math.PI*2);
    ctx.fillStyle='rgba('+r+','+g+','+b+','+alpha+')';
    ctx.fill();
  }
}
generateStars();
window.addEventListener('resize',generateStars);

// DATA LOADER — reads flights.xlsx (or flights.csv fallback)
// Expected columns: Date, From, To, Airline
// ============================================================
var statusEl = document.getElementById('data-status');

function loadFlightData(){
  return new Promise(function(resolve, reject){
    statusEl.textContent = '📡 Loading flight data...';
    statusEl.style.color = '#aaa';

    // Try Excel first, then CSV
    fetch('flights.xlsx').then(function(r){
      if(!r.ok) throw new Error('No xlsx');
      return r.arrayBuffer();
    }).then(function(buf){
      statusEl.textContent = '⏳ Parsing Excel...';
      var wb = XLSX.read(buf, {type:'array', cellDates:true});
      var ws = wb.Sheets[wb.SheetNames[0]];
      var rows = XLSX.utils.sheet_to_json(ws, {defval:''});
      var flights = parseRows(rows);
      statusEl.textContent = '✓ Loaded ' + flights.length + ' flights from flights.xlsx';
      statusEl.style.color = '#8f8';
      resolve(flights);
    }).catch(function(){
      // Fallback to CSV
      fetch('flights.csv').then(function(r){
        if(!r.ok) throw new Error('No csv');
        return r.text();
      }).then(function(text){
        statusEl.textContent = '⏳ Parsing CSV...';
        var flights = parseCSV(text);
        statusEl.textContent = '✓ Loaded ' + flights.length + ' flights from flights.csv';
        statusEl.style.color = '#8f8';
        resolve(flights);
      }).catch(function(){
        statusEl.textContent = '⚠ No flights.xlsx or flights.csv found. Place file in repo root.';
        statusEl.style.color = '#f88';
        reject(new Error('No data file found'));
      });
    });
  });
}

// Flexible column name matching
function findCol(headers, candidates){
  for(var i=0;i<headers.length;i++){
    var h = String(headers[i]).trim().toLowerCase().replace(/[_\s]/g,'');
    for(var j=0;j<candidates.length;j++){
      if(h===candidates[j]) return headers[i];
    }
  }
  return null;
}

function parseRows(rows){
  if(!rows.length) return [];
  var headers = Object.keys(rows[0]);
  var dateCol = findCol(headers,['date']);
  var fromCol = findCol(headers,['from','origin','departure','fromoiata','dep']);
  var toCol   = findCol(headers,['to','destination','arrival','tooiata','arr']);
  var alCol   = findCol(headers,['airline','carrier','airlinename']);

  if(!dateCol||!fromCol||!toCol){
    statusEl.textContent = '⚠ Missing columns. Need: Date, From, To (and optionally Airline)';
    statusEl.style.color = '#f88';
    return [];
  }

  var flights = [];
  var skipped = {};
  rows.forEach(function(row){
    var rawDate = row[dateCol];
    var d = parseFlexDate(rawDate);
    if(!d) return;
    var from = String(row[fromCol]).trim().toUpperCase();
    var to   = String(row[toCol]).trim().toUpperCase();
    var al   = alCol ? String(row[alCol]).trim() : 'Unknown';
    if(!from||!to||from.length<2||to.length<2) return;
    if(!AIRPORTS[from]){skipped[from]=(skipped[from]||0)+1;return}
    if(!AIRPORTS[to]){skipped[to]=(skipped[to]||0)+1;return}
    flights.push({d:d,f:from,t:to,al:al,yr:d.getFullYear()});
  });

  // Show skipped airports visibly
  var skippedCodes = Object.keys(skipped);
  if(skippedCodes.length){
    var msg = '⚠ ' + skippedCodes.length + ' unknown airport code(s) skipped: ' +
      skippedCodes.map(function(c){return c+' ('+skipped[c]+')'}).join(', ') +
      '. Add them to the AIRPORTS table in index.html.';
    console.warn(msg);
    var warn = document.createElement('div');
    warn.style.cssText = 'position:fixed;bottom:60px;left:50%;transform:translateX(-50%);z-index:50;background:rgba(180,80,0,.9);color:#fff;padding:8px 16px;border-radius:8px;font-size:12px;max-width:90vw;text-align:center;backdrop-filter:blur(10px);cursor:pointer';
    warn.textContent = msg;
    warn.title = 'Click to dismiss';
    warn.onclick = function(){warn.remove()};
    document.body.appendChild(warn);
  }

  flights.sort(function(a,b){return a.d-b.d});
  return flights;
}

function parseFlexDate(v){
  if(!v) return null;
  // Already a Date object (from SheetJS cellDates)
  if(v instanceof Date && !isNaN(v)) return v;
  var s = String(v).trim();
  // Try M/D/YY or M/D/YYYY
  var parts = s.split(/[\/\-]/);
  if(parts.length===3){
    var m=parseInt(parts[0],10), day=parseInt(parts[1],10), y=parseInt(parts[2],10);
    if(y<100) y+=2000;
    if(m>=1&&m<=12&&day>=1&&day<=31&&y>=1990&&y<=2099){
      return new Date(y,m-1,day);
    }
  }
  // Fallback to native parse
  var d = new Date(s);
  return isNaN(d) ? null : d;
}

function parseCSV(text){
  var lines = text.trim().split(/\r?\n/);
  if(lines.length<2) return [];
  var sep = lines[0].indexOf('\t')>=0 ? '\t' : ',';
  var headers = lines[0].split(sep).map(function(h){return h.trim().replace(/^"|"$/g,'')});
  var rows = [];
  for(var i=1;i<lines.length;i++){
    var vals = lines[i].split(sep).map(function(v){return v.trim().replace(/^"|"$/g,'')});
    var obj = {};
    headers.forEach(function(h,j){obj[h]=vals[j]||''});
    rows.push(obj);
  }
  return parseRows(rows);
}


// ============================================================
// VISUALIZATION ENGINE (data-agnostic)
// ============================================================
var map, ready=false, userInteracting=false;
var FL=[], arcs=[];
var D2R=Math.PI/180;

function hav(a,b){
  var dLa=(b[0]-a[0])*D2R,dLo=(b[1]-a[1])*D2R;
  var x=Math.sin(dLa/2);x*=x;
  x+=Math.cos(a[0]*D2R)*Math.cos(b[0]*D2R)*Math.sin(dLo/2)*Math.sin(dLo/2);
  return 3959*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

function gcArc(a,b,n){
  var la1=a[0]*D2R,lo1=a[1]*D2R,la2=b[0]*D2R,lo2=b[1]*D2R;
  var p1=[Math.cos(la1)*Math.cos(lo1),Math.cos(la1)*Math.sin(lo1),Math.sin(la1)];
  var p2=[Math.cos(la2)*Math.cos(lo2),Math.cos(la2)*Math.sin(lo2),Math.sin(la2)];
  var dt=p1[0]*p2[0]+p1[1]*p2[1]+p1[2]*p2[2];
  var ag=Math.acos(Math.max(-1,Math.min(1,dt)));
  var sA=Math.sin(ag);var pts=[];
  for(var i=0;i<=n;i++){var t=i/n;var x,y,z;
    if(sA<.001){x=p1[0]+(p2[0]-p1[0])*t;y=p1[1]+(p2[1]-p1[1])*t;z=p1[2]+(p2[2]-p1[2])*t}
    else{var ca=Math.sin((1-t)*ag)/sA,cb=Math.sin(t*ag)/sA;x=ca*p1[0]+cb*p2[0];y=ca*p1[1]+cb*p2[1];z=ca*p1[2]+cb*p2[2]}
    var ln=Math.sqrt(x*x+y*y+z*z);x/=ln;y/=ln;z/=ln;
    pts.push([Math.atan2(y,x)/D2R,Math.asin(z)/D2R])}
  return pts;
}

function initFlights(flights){
  FL = flights;
  FL.forEach(function(f){f.di=hav(AIRPORTS[f.f],AIRPORTS[f.t])});
  arcs = FL.map(function(f){return gcArc(AIRPORTS[f.f],AIRPORTS[f.t],40)});
  buildLegend();
}

// Legend

function buildLegend(){
  var alC={};FL.forEach(function(f){alC[f.al]=(alC[f.al]||0)+1});
  var srt=Object.keys(alC).map(function(k){return[k,alC[k]]}).sort(function(a,b){return b[1]-a[1]});
  var mA=srt.filter(function(e){return e[1]>=5}),oA=srt.filter(function(e){return e[1]<5});
  var oT=oA.reduce(function(s,e){return s+e[1]},0);
  var h='';
  mA.forEach(function(e){h+='<div class="li"><div class="sw" style="background:'+aColor(e[0])+'"></div>'+e[0]+' ('+e[1]+')</div>'});
  if(oA.length){
    h+='<div class="ot" id="ot">'+(oE?'▾':'▸')+' Other ('+oT+' flights, '+oA.length+' carriers)</div>';
    if(oE) oA.forEach(function(e){h+='<div class="li" style="padding-left:6px;opacity:.8"><div class="sw" style="background:'+aColor(e[0])+'"></div>'+e[0]+' ('+e[1]+')</div>'});
  }
  document.getElementById('lb').innerHTML=h;
  var t=document.getElementById('ot');
  if(t) t.onclick=function(ev){ev.stopPropagation();oE=!oE;buildLegend()};
}
document.getElementById('lh').onclick=function(){document.getElementById('leg').classList.toggle('shut')};

// Animation state
var cF=0,aP=0,pl=true,sp=1,sA=false,autoRot=true,tD=0;
var spds=[1,2,5,10,25],sI=0;
var vA={},completedFeats=[],airportFeats={};

function mkFeat(idx){
  var f=FL[idx];
  return{type:'Feature',properties:{
    color:aColor(f.al),
    airline:f.al,
    from:f.f,
    to:f.t,
    date:(f.d.getMonth()+1)+'/'+f.d.getDate()+'/'+f.d.getFullYear(),
    dist:Math.round(f.di).toLocaleString()+' mi',
    idx:idx
  },geometry:{type:'LineString',coordinates:arcs[idx]}};
}

function updateSources(){
  if(!ready)return;
  map.getSource('completed').setData({type:'FeatureCollection',features:completedFeats});
  var af=[];
  if(!sA&&cF<FL.length){
    var n=Math.floor(aP*(arcs[cF].length-1))+1;
    var f=FL[cF];
    af=[{type:'Feature',properties:{
      color:aColor(f.al),airline:f.al,from:f.f,to:f.t,
      date:(f.d.getMonth()+1)+'/'+f.d.getDate()+'/'+f.d.getFullYear(),
      dist:Math.round(f.di).toLocaleString()+' mi',idx:cF
    },geometry:{type:'LineString',coordinates:arcs[cF].slice(0,n)}}];
  }
  map.getSource('active').setData({type:'FeatureCollection',features:af});
  var apFeats=Object.keys(airportFeats).map(function(c){
    var a=AIRPORTS[c];
    return{type:'Feature',properties:{size:Math.min(2+airportFeats[c]*.15,6)},geometry:{type:'Point',coordinates:[a[1],a[0]]}};
  });
  map.getSource('airports').setData({type:'FeatureCollection',features:apFeats});
}

function uI(){
  var yr=document.getElementById('yr'),rt=document.getElementById('rt'),st=document.getElementById('st'),dt=document.getElementById('dt'),pb=document.getElementById('pb');
  if(sA){yr.textContent='All Flights';rt.textContent=FL.length+' flights';dt.textContent=Math.round(FL.reduce(function(s,f){return s+f.di},0)).toLocaleString()+' mi total';st.textContent=FL.length?FL[0].yr+' – '+FL[FL.length-1].yr:'';pb.style.width='100%'}
  else if(cF<FL.length){var f=FL[cF];yr.textContent=f.yr;rt.textContent=f.f+' → '+f.t;st.textContent=f.al;dt.textContent='Flight '+(cF+1)+'/'+FL.length+' · '+Math.round(tD).toLocaleString()+' mi';pb.style.width=(cF/FL.length*100)+'%'}
  else{yr.textContent='Complete';rt.textContent='—';pb.style.width='100%'}
}

var lastT=0;
function animate(ts){
  requestAnimationFrame(animate);if(!ready||!FL.length)return;
  var dt=(ts-lastT)/1000;if(dt>.05)dt=.05;lastT=ts;
  if(autoRot&&!userInteracting){var c=map.getCenter();c.lng+=dt*4;map.setCenter(c)}
  if(sA){uI();return}
  if(pl&&cF<FL.length){
    var f=FL[cF];var dur=Math.max(.08,Math.min(.5,.15+f.di/8000))/sp;
    aP+=dt/dur;
    if(aP>=1){aP=0;tD+=f.di;vA[f.f]=(vA[f.f]||0)+1;vA[f.t]=(vA[f.t]||0)+1;
      airportFeats[f.f]=(airportFeats[f.f]||0)+1;airportFeats[f.t]=(airportFeats[f.t]||0)+1;
      completedFeats.push(mkFeat(cF));cF++}
    updateSources();
  }
  uI();
}

function showAllFlights(){
  completedFeats=FL.map(function(_,i){return mkFeat(i)});
  FL.forEach(function(f){airportFeats[f.f]=(airportFeats[f.f]||0);airportFeats[f.t]=(airportFeats[f.t]||0)});
  updateSources();
}


// ============================================================
// MAP INITIALIZATION
// ============================================================
function initMap(){
  var tkInput=document.getElementById('tk');
  var token=tkInput.value.trim() || MAPBOX_TOKEN;
  if(!token||!token.startsWith('pk.')){
    tkInput.classList.add('err');
    document.getElementById('token-err').style.display='block';
    setTimeout(function(){tkInput.classList.remove('err')},400);
    return;
  }
  if(typeof mapboxgl==='undefined'){
    statusEl.textContent='⚠ Mapbox GL JS failed to load.';statusEl.style.color='#f88';return;
  }
  if(!FL.length){
    statusEl.textContent='⚠ No flight data loaded yet.';statusEl.style.color='#f88';return;
  }

  mapboxgl.accessToken=token;
  document.getElementById('token-screen').style.display='none';
  document.getElementById('info').style.display='block';
  document.getElementById('leg').style.display='block';
  document.getElementById('ui').style.display='flex';
  document.getElementById('pb').style.display='block';

  map=new mapboxgl.Map({
    container:'map',
    style:'mapbox://styles/mapbox/standard-satellite',
    projection:'globe',
    center:[-40,30],
    zoom:1.5
  });

  map.on('mousedown',function(){userInteracting=true});
  map.on('mouseup',function(){userInteracting=false});
  map.on('touchstart',function(){userInteracting=true});
  map.on('touchend',function(){userInteracting=false});
  map.on('dragend',function(){userInteracting=false});

  map.on('style.load',function(){
    try{map.setConfigProperty('basemap','lightPreset','night')}catch(e){}
    try{map.setConfigProperty('basemap','showPointOfInterestLabels',false)}catch(e){}
    try{map.setConfigProperty('basemap','showPlaceLabels',false)}catch(e){}
    try{map.setConfigProperty('basemap','showRoadLabels',false)}catch(e){}
    try{map.setFog({'space-color':'rgba(0,0,0,0)','star-intensity':0,'color':'rgb(0,0,0)','high-color':'rgb(0,0,0)','horizon-blend':0.02})}catch(e){}

    map.addSource('completed',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
    map.addSource('active',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
    map.addSource('airports',{type:'geojson',data:{type:'FeatureCollection',features:[]}});

    map.addLayer({id:'completed-glow',type:'line',source:'completed',slot:'top',paint:{'line-color':['get','color'],'line-width':5,'line-opacity':0.25,'line-blur':3,'line-emissive-strength':1}});
    map.addLayer({id:'completed-lines',type:'line',source:'completed',slot:'top',paint:{'line-color':['get','color'],'line-width':2,'line-opacity':1,'line-emissive-strength':1}});
    map.addLayer({id:'active-glow',type:'line',source:'active',slot:'top',paint:{'line-color':['get','color'],'line-width':10,'line-opacity':0.4,'line-blur':4,'line-emissive-strength':1}});
    map.addLayer({id:'active-line',type:'line',source:'active',slot:'top',paint:{'line-color':['get','color'],'line-width':3.5,'line-opacity':1,'line-emissive-strength':1}});
    map.addLayer({id:'airport-dots',type:'circle',source:'airports',slot:'top',paint:{'circle-radius':['get','size'],'circle-color':'#ffffff','circle-opacity':0.7,'circle-stroke-width':0.5,'circle-stroke-color':'rgba(100,180,255,0.4)','circle-emissive-strength':1}});

    // Invisible wider hit area for easier hover detection on lines
    map.addLayer({id:'completed-hover',type:'line',source:'completed',slot:'top',paint:{'line-color':'rgba(0,0,0,0)','line-width':12}});
    map.addLayer({id:'active-hover',type:'line',source:'active',slot:'top',paint:{'line-color':'rgba(0,0,0,0)','line-width':12}});

    // Popup for flight details
    var popup=new mapboxgl.Popup({closeButton:false,closeOnClick:false,className:'flight-popup',maxWidth:'260px'});

    function showPopup(e){
      if(!e.features||!e.features.length)return;
      var p=e.features[0].properties;
      map.getCanvas().style.cursor='pointer';
      var html='<div style="font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:13px;line-height:1.5">'
        +'<div style="font-size:16px;font-weight:700;color:'+p.color+'">'+p.from+' → '+p.to+'</div>'
        +'<div style="opacity:.8">'+p.airline+'</div>'
        +'<div style="opacity:.6;font-size:12px">'+p.date+' · '+p.dist+'</div>'
        +'</div>';
      popup.setLngLat(e.lngLat).setHTML(html).addTo(map);
    }
    function hidePopup(){
      map.getCanvas().style.cursor='';
      popup.remove();
    }

    map.on('mousemove','completed-hover',showPopup);
    map.on('mouseleave','completed-hover',hidePopup);
    map.on('mousemove','active-hover',showPopup);
    map.on('mouseleave','active-hover',hidePopup);

    // Touch support — tap to show, tap elsewhere to dismiss
    map.on('click','completed-hover',showPopup);
    map.on('click','active-hover',showPopup);
    map.on('click',function(e){
      var f1=map.queryRenderedFeatures(e.point,{layers:['completed-hover','active-hover']});
      if(!f1.length) popup.remove();
    });

    ready=true;lastT=performance.now();requestAnimationFrame(animate);
  });
}

// ============================================================
// UI CONTROLS
// ============================================================
document.getElementById('go').onclick=initMap;
document.getElementById('tk').onkeydown=function(e){if(e.key==='Enter')initMap()};
document.getElementById('bp').onclick=function(){pl=!pl;this.classList.toggle('active',pl);this.textContent=pl?'▶ Play':'⏸ Pause'};
document.getElementById('bs').onclick=function(){sI=(sI+1)%spds.length;sp=spds[sI];this.textContent=sp+'×'};
document.getElementById('ba').onclick=function(){sA=!sA;this.classList.toggle('active',sA);this.textContent=sA?'Animate':'Show All';if(sA)showAllFlights()};
document.getElementById('br').onclick=function(){autoRot=!autoRot;this.classList.toggle('active',autoRot);this.textContent=autoRot?'Rotate':'Fixed'};
document.getElementById('bx').onclick=function(){
  cF=0;aP=0;tD=0;sA=false;completedFeats=[];airportFeats={};vA={};
  if(ready)updateSources();
  if(map)map.flyTo({center:[-40,30],zoom:1.5});
  document.getElementById('ba').classList.remove('active');document.getElementById('ba').textContent='Show All';
  pl=true;document.getElementById('bp').classList.add('active');document.getElementById('bp').textContent='▶ Play';
};


// ============================================================
// MAPBOX TOKEN — injected by GitHub Actions at deploy time
// Do not paste your token here. Set it as a GitHub secret
// named MAPBOX_TOKEN, and the deploy workflow replaces this.
// For local development, set ?token=pk.xxx in the URL.
// ============================================================
var MAPBOX_TOKEN = '__MAPBOX_TOKEN__';

// Allow local override via URL param: index.html?token=pk.eyJ1...
var urlParams = new URLSearchParams(window.location.search);
if(urlParams.has('token')) MAPBOX_TOKEN = urlParams.get('token');


// ============================================================
// BOOT SEQUENCE — load data first, then init map
// ============================================================
loadFlightData().then(function(flights){
  initFlights(flights);
  // If token was injected by CI or passed via URL, skip the prompt
  if(MAPBOX_TOKEN && MAPBOX_TOKEN.startsWith('pk.')){
    document.getElementById('tk').value = MAPBOX_TOKEN;
    initMap();
  }
}).catch(function(err){
  console.error(err);
});

})();
</script>
