var mA=srt.filter(function(e){return e[1]>=5}),oA=srt.filter(function(e){return e[1]<5});
var oT=oA.reduce(function(s,e){return s+e[1]},0),oE=false;
function bL(){var h='';mA.forEach(function(e){h+='<div class="li"><div class="sw" style="background:'+aColor(e[0])+'"></div>'+e[0]+' ('+e[1]+')</div>'});
if(oA.length){h+='<div class="ot" id="ot">'+(oE?'▾':'▸')+' Other ('+oT+' flights, '+oA.length+' carriers)</div>';if(oE)oA.forEach(function(e){h+='<div class="li" style="padding-left:6px;opacity:.8"><div class="sw" style="background:'+aColor(e[0])+'"></div>'+e[0]+' ('+e[1]+')</div>'})}
document.getElementById('lb').innerHTML=h;var t=document.getElementById('ot');if(t)t.onclick=function(e){e.stopPropagation();oE=!oE;bL()}}
bL();
document.getElementById('lh').onclick=function(){document.getElementById('leg').classList.toggle('shut')};

var cF=0,aP=0,pl=true,sp=1,sA=false,autoRot=true,tD=0;
var spds=[1,2,5,10,25],sI=0;
var vA={},completedFeats=[],airportFeats={};

function mkFeat(idx){
  return{type:'Feature',properties:{color:aColor(FL[idx].al)},geometry:{type:'LineString',coordinates:arcs[idx]}}
}

function updateSources(){
  if(!ready)return;
  map.getSource('completed').setData({type:'FeatureCollection',features:completedFeats});
  var af=[];
  if(!sA&&cF<FL.length){
    var n=Math.floor(aP*(arcs[cF].length-1))+1;
    af=[{type:'Feature',properties:{color:aColor(FL[cF].al)},geometry:{type:'LineString',coordinates:arcs[cF].slice(0,n)}}];
  }
  map.getSource('active').setData({type:'FeatureCollection',features:af});
  var apFeats=Object.keys(airportFeats).map(function(c){
    var a=AP[c];return{type:'Feature',properties:{size:Math.min(2+airportFeats[c]*.15,6)},geometry:{type:'Point',coordinates:[a[1],a[0]]}}
  });
  map.getSource('airports').setData({type:'FeatureCollection',features:apFeats});
}

function uI(){
  var yr=document.getElementById('yr'),rt=document.getElementById('rt'),st=document.getElementById('st'),dt=document.getElementById('dt'),pb=document.getElementById('pb');
  if(sA){yr.textContent='All Flights';rt.textContent=FL.length+' flights';dt.textContent=Math.round(FL.reduce(function(s,f){return s+f.di},0)).toLocaleString()+' mi total';st.textContent='2004 – 2025';pb.style.width='100%'}
  else if(cF<FL.length){var f=FL[cF];yr.textContent=f.yr;rt.textContent=f.f+' → '+f.t;st.textContent=f.al;dt.textContent='Flight '+(cF+1)+'/'+FL.length+' · '+Math.round(tD).toLocaleString()+' mi';pb.style.width=(cF/FL.length*100)+'%'}
  else{yr.textContent='Complete';rt.textContent='—';pb.style.width='100%'}
}

var lastT=0;
function animate(ts){
  requestAnimationFrame(animate);if(!ready)return;
  var dt=(ts-lastT)/1000;if(dt>.05)dt=.05;lastT=ts;
  if(autoRot&&!userInteracting){var c=map.getCenter();c.lng+=dt*8;map.setCenter(c)}
  if(sA){uI();return}
  if(pl&&cF<FL.length){
    var f=FL[cF];var dur=Math.max(.08,Math.min(.5,.15+f.di/8000))/sp;
    aP+=dt/dur;
    if(aP>=1){aP=0;tD+=f.di;vA[f.f]=(vA[f.f]||0)+1;vA[f.t]=(vA[f.t]||0)+1;airportFeats[f.f]=(airportFeats[f.f]||0)+1;airportFeats[f.t]=(airportFeats[f.t]||0)+1;completedFeats.push(mkFeat(cF));cF++}
    updateSources();
  }
  uI();
}

function showAll(){
  completedFeats=FL.map(function(_,i){return mkFeat(i)});
  FL.forEach(function(f){airportFeats[f.f]=(airportFeats[f.f]||0);airportFeats[f.t]=(airportFeats[f.t]||0)});
  updateSources();
}

function initMap(){
  var tkInput=document.getElementById('tk');
  var token=tkInput.value.trim();
  if(!token||!token.startsWith('pk.')){
    tkInput.classList.add('err');
    document.getElementById('token-err').style.display='block';
    setTimeout(function(){tkInput.classList.remove('err')},400);
    return;
  }
  if(typeof mapboxgl==='undefined'){
    document.getElementById('load-err').style.display='flex';return;
  }
  mapboxgl.accessToken=token;
  document.getElementById('token-screen').style.display='none';
  document.getElementById('info').style.display='block';
  document.getElementById('leg').style.display='block';
  document.getElementById('ui').style.display='flex';
  document.getElementById('pb').style.display='block';

  map=new mapboxgl.Map({container:'map',style:'mapbox://styles/mapbox/dark-v11',projection:'globe',center:[-40,30],zoom:1.5});
  map.on('mousedown',function(){userInteracting=true});
  map.on('mouseup',function(){userInteracting=false});
  map.on('touchstart',function(){userInteracting=true});
  map.on('touchend',function(){userInteracting=false});
  map.on('dragend',function(){userInteracting=false});

  map.on('style.load',function(){
    map.setFog({color:'rgb(8,8,24)','high-color':'rgb(20,20,60)','horizon-blend':0.06,'space-color':'rgb(5,5,12)','star-intensity':0.7});
    map.addSource('completed',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
    map.addSource('active',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
    map.addSource('airports',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
    map.addLayer({id:'completed-glow',type:'line',source:'completed',paint:{'line-color':['get','color'],'line-width':4,'line-opacity':0.15,'line-blur':3}});
    map.addLayer({id:'completed-lines',type:'line',source:'completed',paint:{'line-color':['get','color'],'line-width':1.5,'line-opacity':0.75}});
    map.addLayer({id:'active-glow',type:'line',source:'active',paint:{'line-color':['get','color'],'line-width':8,'line-opacity':0.3,'line-blur':4}});
    map.addLayer({id:'active-line',type:'line',source:'active',paint:{'line-color':['get','color'],'line-width':3,'line-opacity':1}});
    map.addLayer({id:'airport-dots',type:'circle',source:'airports',paint:{'circle-radius':['get','size'],'circle-color':'#ffffff','circle-opacity':0.6,'circle-stroke-width':0.5,'circle-stroke-color':'rgba(100,180,255,0.4)'}});
    ready=true;lastT=performance.now();requestAnimationFrame(animate);
  });
}

document.getElementById('go').onclick=initMap;
document.getElementById('tk').onkeydown=function(e){if(e.key==='Enter')initMap()};

document.getElementById('bp').onclick=function(){pl=!pl;this.classList.toggle('active',pl);this.textContent=pl?'▶ Play':'⏸ Pause'};
document.getElementById('bs').onclick=function(){sI=(sI+1)%spds.length;sp=spds[sI];this.textContent=sp+'×'};
document.getElementById('ba').onclick=function(){sA=!sA;this.classList.toggle('active',sA);this.textContent=sA?'Animate':'Show All';if(sA)showAll()};
document.getElementById('br').onclick=function(){autoRot=!autoRot;this.classList.toggle('active',autoRot);this.textContent=autoRot?'Rotate':'Fixed'};
document.getElementById('bx').onclick=function(){cF=0;aP=0;tD=0;sA=false;completedFeats=[];airportFeats={};vA={};if(ready)updateSources();map.flyTo({center:[-40,30],zoom:1.5});document.getElementById('ba').classList.remove('active');document.getElementById('ba').textContent='Show All';pl=true;document.getElementById('bp').classList.add('active');document.getElementById('bp').textContent='▶ Play'};
})();
</script>
</body>
</html>
